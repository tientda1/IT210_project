<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chọn Ghế Ngồi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        .screen {
            width: 100%;
            height: 10px;
            background: #6c757d;
            margin: 20px 0 50px 0;
            box-shadow: 0 5px 15px rgba(108,117,125,0.5);
            border-radius: 50%;
            text-align: center;
            color: #fff;
            font-size: 12px;
        }
        .seat {
            width: 35px;
            height: 35px;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            border: 1px solid #dee2e6;
            background-color: #fff;
        }
        .seat.available:hover { background-color: #d1e7dd; transform: scale(1.1); }
        .seat.selected { background-color: #198754 !important; color: white; }
        .seat.booked { background-color: #adb5bd !important; cursor: not-allowed; color: #6c757d; }
        .legend-item { display: flex; align-items: center; gap: 8px; margin-right: 20px; }
        .legend-box { width: 20px; height: 20px; border-radius: 3px; border: 1px solid #ddd; }
    </style>
</head>
<body class="bg-light">
<div class="container mt-4 mb-5">
    <div class="row">
        <div class="col-lg-8 card shadow-sm p-4 bg-white border-0">
            <h4 class="text-center fw-bold"><i class="bi bi-display"></i> MÀN HÌNH</h4>
            <div class="screen"></div>

            <div class="text-center" id="seat-map">
                <div th:each="seat : ${allSeats}"
                     class="seat available"
                     th:classappend="${#lists.contains(bookedSeatIds, seat.seatId)} ? 'booked' : ''"
                     th:attr="data-id=${seat.seatId}, data-name=${seat.seatName}"
                     th:text="${seat.seatName}">
                </div>
            </div>

            <div class="d-flex justify-content-center mt-5">
                <div class="legend-item"><div class="legend-box"></div> Trống</div>
                <div class="legend-item"><div class="legend-box bg-success"></div> Đang chọn</div>
                <div class="legend-item"><div class="legend-box bg-secondary"></div> Đã bán</div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="card shadow border-0 sticky-top" style="top: 20px;">
                <div class="card-header bg-dark text-white py-3">
                    <h5 class="mb-0">Chi tiết đặt vé</h5>
                </div>
                <div class="card-body">
                    <h5 class="fw-bold" th:text="${showtime.movie.title}"></h5>
                    <p class="mb-1 small text-muted"><i class="bi bi-clock"></i> <span th:text="${#temporals.format(showtime.startTime, 'HH:mm - dd/MM/yyyy')}"></span></p>
                    <p class="mb-3 small text-muted"><i class="bi bi-door-open"></i> Phòng: <span th:text="${showtime.room.roomName}"></span></p>
                    <hr>
                    <div class="d-flex justify-content-between mb-2">
                        <span>Ghế đã chọn:</span>
                        <strong id="selected-seats-display" class="text-success">Chưa chọn</strong>
                    </div>
                    <div class="d-flex justify-content-between mb-3">
                        <span>Tổng tiền:</span>
                        <h4 id="total-price-display" class="text-danger fw-bold">0đ</h4>
                    </div>

                    <form th:action="@{/booking/confirm}" method="post" id="booking-form">
                        <input type="hidden" name="showtimeId" th:value="${showtime.showtimeId}">
                        <input type="hidden" name="seatIds" id="seatIdsInput">
                        <button type="button" onclick="submitBooking()" class="btn btn-success w-100 fw-bold py-2">XÁC NHẬN ĐẶT VÉ</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    const pricePerSeat = [[${showtime.price}]];
    let selectedSeatIds = [];
    let selectedSeatNames = [];

    document.querySelectorAll('.seat.available').forEach(seat => {
        seat.addEventListener('click', () => {
            const id = seat.getAttribute('data-id');
            const name = seat.getAttribute('data-name');

            if (seat.classList.contains('selected')) {
                seat.classList.remove('selected');
                selectedSeatIds = selectedSeatIds.filter(i => i !== id);
                selectedSeatNames = selectedSeatNames.filter(n => n !== name);
            } else {
                seat.classList.add('selected');
                selectedSeatIds.push(id);
                selectedSeatNames.push(name);
            }
            updateUI();
        });
    });

    function updateUI() {
        document.getElementById('selected-seats-display').innerText = selectedSeatNames.join(', ') || 'Chưa chọn';
        document.getElementById('total-price-display').innerText = (selectedSeatIds.length * pricePerSeat).toLocaleString('vi-VN') + 'đ';
        document.getElementById('seatIdsInput').value = selectedSeatIds.join(',');
    }

    function submitBooking() {
        if (selectedSeatIds.length === 0) {
            alert('Vui lòng chọn ít nhất 1 ghế!');
            return;
        }
        if (confirm('Bạn chắc chắn muốn đặt các ghế: ' + selectedSeatNames.join(', ') + '?')) {
            document.getElementById('booking-form').submit();
        }
    }
</script>
</body>
</html>
