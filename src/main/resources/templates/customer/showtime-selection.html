<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chọn Suất Chiếu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand" th:href="@{/movies}"><i class="bi bi-arrow-left"></i> Quay lại Phim đang chiếu</a>
    </div>
</nav>

<div class="container mt-5">
    <div class="row">
        <div class="col-md-4 mb-4">
            <div class="card border-0 shadow-sm">
                <img th:src="${movie.posterUrl}" class="card-img-top rounded" alt="Poster">
                <div class="card-body">
                    <h4 class="fw-bold" th:text="${movie.title}">Tên phim</h4>
                    <p class="text-muted"><i class="bi bi-clock"></i> <span th:text="${movie.durationMinutes + ' phút'}"></span></p>
                    <p class="small" th:text="${movie.description}"></p>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <h3 class="text-success border-bottom pb-2 fw-bold"><i class="bi bi-calendar-check"></i> Chọn Suất Chiếu</h3>

            <div th:if="${#lists.isEmpty(showtimes)}" class="alert alert-warning mt-4 shadow-sm">
                <i class="bi bi-emoji-frown"></i> Rất tiếc, bộ phim này hiện tại chưa có suất chiếu nào sắp diễn ra. Bạn vui lòng quay lại sau!
            </div>

            <div class="list-group mt-4">
                <th:block th:each="st : ${showtimes}">

                    <a th:if="${!soldOutMap[st.showtimeId]}"
                       th:href="@{/booking/showtime/{id}(id=${st.showtimeId})}"
                       class="list-group-item list-group-item-action d-flex justify-content-between align-items-center p-3 shadow-sm mb-2 rounded border-start border-success border-4">
                        <div>
                            <h5 class="mb-1 fw-bold text-dark">
                                <i class="bi bi-clock-history text-success"></i>
                                <span th:text="${#temporals.format(st.startTime, 'HH:mm - dd/MM/yyyy')}"></span>
                            </h5>
                            <small class="text-muted"><i class="bi bi-door-open"></i> Phòng: <strong th:text="${st.room.roomName}"></strong></small>
                        </div>
                        <div class="text-end">
                            <span class="fs-5 fw-bold text-danger d-block" th:text="${#numbers.formatDecimal(st.price, 0, 'COMMA', 0, 'POINT') + 'đ'}"></span>
                            <span class="badge bg-success">Chọn ghế <i class="bi bi-arrow-right"></i></span>
                        </div>
                    </a>

                    <div th:if="${soldOutMap[st.showtimeId]}"
                         class="list-group-item d-flex justify-content-between align-items-center p-3 shadow-sm mb-2 rounded border-start border-secondary border-4 bg-light text-muted"
                         style="cursor: not-allowed; opacity: 0.65;">
                        <div>
                            <h5 class="mb-1 fw-bold text-secondary">
                                <i class="bi bi-clock-history"></i>
                                <span th:text="${#temporals.format(st.startTime, 'HH:mm - dd/MM/yyyy')}"></span>
                            </h5>
                            <small><i class="bi bi-door-open"></i> Phòng: <strong th:text="${st.room.roomName}"></strong></small>
                        </div>
                        <div class="text-end">
                            <span class="fs-5 fw-bold text-secondary d-block" th:text="${#numbers.formatDecimal(st.price, 0, 'COMMA', 0, 'POINT') + 'đ'}"></span>
                            <span class="badge bg-secondary px-3 py-2">HẾT VÉ <i class="bi bi-x-circle"></i></span>
                        </div>
                    </div>

                </th:block>
            </div>
        </div>
    </div>
</div>
</body>
</html>
