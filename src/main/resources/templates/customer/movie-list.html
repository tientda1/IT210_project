<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Phim Đang Chiếu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        .movie-card:hover {
            transform: scale(1.03);
            transition: 0.3s ease-in-out;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2) !important;
        }

        .poster-img {
            height: 400px;
            object-fit: cover;
        }
    </style>
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark shadow-sm sticky-top">
    <div class="container">
        <a class="navbar-brand" th:href="@{/dashboard}"><i class="bi bi-arrow-left"></i> Quay lại Dashboard</a>
        <span class="text-white fw-bold"><i class="bi bi-ticket-perforated"></i> Đặt Vé Xem Phim</span>
    </div>
</nav>

<div class="container mt-5 mb-5">
    <h2 class="text-success border-bottom border-success pb-2 border-3 mb-4 fw-bold">
        <i class="bi bi-film"></i> PHIM ĐANG CHIẾU
    </h2>

    <div class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4">
        <div class="col" th:each="movie : ${movies}">
            <div class="card h-100 shadow-sm border-0 movie-card">
                <img th:src="${movie.posterUrl}" class="card-img-top poster-img" alt="Movie Poster">

                <div class="card-body d-flex flex-column">
                    <h5 class="card-title fw-bold text-dark text-truncate" th:text="${movie.title}">Tên Phim</h5>

                    <p class="card-text text-muted small mb-2">
                        <i class="bi bi-person-video text-primary"></i> Đạo diễn: <strong th:text="${movie.director}"></strong><br>

                        <i class="bi bi-tags-fill text-warning"></i> Thể loại: <strong th:text="${movie.genre != null ? movie.genre.genreName : 'Đang cập nhật'}"></strong><br>
                        <i class="bi bi-clock-fill text-info"></i> Thời lượng: <span th:text="${movie.durationMinutes + ' phút'}"></span>
                    </p>

                    <p class="card-text text-truncate" style="font-size: 0.9rem;" th:text="${movie.description}">Mô tả
                        ngắn gọn...</p>

                    <div class="mt-auto pt-3 border-top">
                        <a th:href="@{/booking/movie/{id}(id=${movie.movieId})}"
                           class="btn btn-outline-success w-100 fw-bold">
                            <i class="bi bi-ticket-detailed"></i> ĐẶT VÉ NGAY
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(movies)}" class="col-12">
            <div class="alert alert-warning text-center py-5">
                <i class="bi bi-emoji-frown fs-1"></i><br>
                <h5>Hiện tại rạp đang trống, chưa có bộ phim nào được công chiếu!</h5>
            </div>
        </div>
    </div>
</div>
</body>
</html>
