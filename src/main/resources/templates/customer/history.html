<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lịch sử giao dịch</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand" th:href="@{/dashboard}"><i class="bi bi-arrow-left"></i> Quay lại Dashboard</a>
        <a th:href="@{/movies}" class="btn btn-outline-success btn-sm"><i class="bi bi-film"></i> Đặt vé phim khác</a>
    </div>
</nav>

<div class="container mt-5 mb-5">
    <div th:if="${success}" class="alert alert-success shadow-sm"><i class="bi bi-check-circle"></i> <span
            th:text="${success}"></span></div>
    <div th:if="${error}" class="alert alert-danger shadow-sm"><i class="bi bi-exclamation-triangle"></i> <span
            th:text="${error}"></span></div>

    <h2 class="text-success border-bottom pb-2 fw-bold"><i class="bi bi-clock-history"></i> Lịch sử đặt vé của bạn</h2>

    <div th:if="${#lists.isEmpty(bookings)}" class="alert alert-info mt-4">
        Bạn chưa có giao dịch đặt vé nào. Hãy ra rạp làm một bộ phim cho nóng nhé!
    </div>

    <div class="row mt-4">
        <div class="col-12 mb-4" th:each="b : ${bookings}">
            <div class="card shadow-sm border-0 border-start border-5" th:if="${not #lists.isEmpty(b.tickets)}"
                 th:classappend="${b.status == 'CONFIRMED' ? 'border-success' : 'border-secondary'}">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center border-bottom pb-2 mb-3">
                        <span class="text-muted small">Mã hóa đơn: #<strong th:text="${b.bookingId}"></strong></span>
                        <span th:if="${b.status == 'CONFIRMED'}" class="badge bg-success px-3 py-2">ĐÃ XÁC NHẬN</span>
                        <span th:if="${b.status == 'CANCELLED'}" class="badge bg-secondary px-3 py-2">ĐÃ HỦY</span>
                    </div>

                    <div class="row">
                        <div class="col-md-2 text-center">
                            <img th:src="${b.tickets[0].showtime.movie.posterUrl}" class="img-fluid rounded shadow-sm"
                                 style="max-height: 120px;" alt="Poster">
                        </div>
                        <div class="col-md-7">
                            <h5 class="fw-bold text-dark" th:text="${b.tickets[0].showtime.movie.title}"></h5>
                            <p class="mb-1"><i class="bi bi-calendar-event text-primary"></i> Thời gian chiếu:
                                <strong th:text="${#temporals.format(b.tickets[0].showtime.startTime, 'HH:mm - dd/MM/yyyy')}"></strong>
                            </p>
                            <p class="mb-1"><i class="bi bi-geo-alt text-danger"></i> Phòng chiếu: <strong
                                    th:text="${b.tickets[0].showtime.room.roomName}"></strong></p>
                            <p class="mb-0"><i class="bi bi-ui-checks-grid text-success"></i> Ghế đã đặt:
                                <strong class="text-success">
                                    <span th:each="t, iterStat : ${b.tickets}"
                                          th:text="${t.seat.seatName} + ${!iterStat.last ? ', ' : ''}"></span>
                                </strong>
                            </p>
                        </div>
                        <div class="col-md-3 text-end d-flex flex-column justify-content-center border-start">
                            <p class="text-muted mb-1 small">Ngày đặt: <span
                                    th:text="${#temporals.format(b.bookingDate, 'dd/MM/yyyy')}"></span></p>
                            <h4 class="text-danger fw-bold"
                                th:text="${#numbers.formatDecimal(b.tickets.size() * b.tickets[0].showtime.price, 0, 'COMMA', 0, 'POINT')} + 'đ'"></h4>

                            <a th:if="${b.status == 'CONFIRMED'}" th:href="@{/booking/cancel/{id}(id=${b.bookingId})}"
                               class="btn btn-outline-danger mt-2"
                               onclick="return confirm('Bạn có chắc chắn muốn hủy vé này? Nhớ luật 24h nhé!');">
                                <i class="bi bi-x-circle"></i> Hủy vé
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
