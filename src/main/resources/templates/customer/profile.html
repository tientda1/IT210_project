<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Hồ sơ cá nhân</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand" th:href="@{/dashboard}"><i class="bi bi-arrow-left"></i> Quay lại Dashboard</a>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0"><i class="bi bi-person-lines-fill"></i> Thông tin cá nhân</h5>
                </div>
                <div class="card-body">
                    <p><strong>Tên đăng nhập:</strong> <span th:text="${session.loggedInUser.username}"></span></p>
                    <p><strong>Họ và tên:</strong> <span th:text="${session.loggedInUser.userProfile.fullName}"></span></p>
                    <p><strong>Email:</strong> <span th:text="${session.loggedInUser.userProfile.email}"></span></p>
                    <p><strong>Số điện thoại:</strong> <span th:text="${session.loggedInUser.userProfile.phone}"></span></p>
                    <hr>
                    <button class="btn btn-warning w-100">Cập nhật hồ sơ (Đang phát triển)</button>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
