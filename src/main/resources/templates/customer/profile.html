<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Hồ sơ cá nhân</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand" th:href="@{/dashboard}"><i class="bi bi-arrow-left"></i> Quay lại Dashboard</a>
    </div>
</nav>

<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">

            <div th:if="${success}" class="alert alert-success shadow-sm">
                <i class="bi bi-check-circle-fill"></i> <span th:text="${success}"></span>
            </div>

            <div class="card shadow border-0">
                <div class="card-header bg-success text-white py-3 text-center">
                    <h4 class="mb-0"><i class="bi bi-person-badge"></i> THÔNG TIN TÀI KHOẢN</h4>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/profile/update}" method="post">

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold text-muted">Tên đăng nhập</label>
                                <input type="text" class="form-control bg-light" th:value="${user.username}" readonly>
                                <small class="text-danger">* Không thể thay đổi</small>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold text-muted">Hạng thẻ (Quyền)</label>
                                <input type="text" class="form-control bg-light" th:value="${user.role}" readonly>
                            </div>
                        </div>

                        <hr class="text-muted">

                        <div class="mb-3 mt-3">
                            <label class="form-label fw-bold">Họ và Tên</label>
                            <input type="text" name="fullName" class="form-control"
                                   th:value="${user.userProfile != null ? user.userProfile.fullName : ''}"
                                   placeholder="VD: Nguyễn Văn A" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Số điện thoại</label>
                            <input type="text" name="phone" class="form-control"
                                   th:value="${user.userProfile != null ? user.userProfile.phone : ''}"
                                   placeholder="09xx.xxx.xxx">
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Địa chỉ Email</label>
                            <input type="email" name="email" class="form-control"
                                   th:value="${user.userProfile != null ? user.userProfile.email : ''}"
                                   placeholder="email@example.com">
                        </div>

                        <button type="submit" class="btn btn-success w-100 fw-bold py-2">
                            LƯU THAY ĐỔI
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
