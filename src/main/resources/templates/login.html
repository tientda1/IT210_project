<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow border-0">
                <div class="card-header bg-primary text-white text-center py-3">
                    <h4 class="mb-0">Hệ thống Đặt vé Rạp chiếu phim</h4>
                </div>
                <div class="card-body p-4">

                    <div th:if="${successMsg}" class="alert alert-success fw-bold text-center"
                         th:text="${successMsg}"></div>

                    <div th:if="${error}" class="alert alert-danger text-center fw-bold" th:text="${error}"></div>

                    <form action="/login" method="post" th:object="${loginDTO}">

                        <div class="mb-3">
                            <label class="form-label fw-bold">Tài khoản:</label>
                            <input type="text" th:field="*{username}" class="form-control"
                                   placeholder="Nhập tên đăng nhập"
                                   th:classappend="${#fields.hasErrors('username')} ? 'is-invalid' : ''"/>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('username')}"
                                 th:errors="*{username}"></div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Mật khẩu:</label>
                            <input type="password" th:field="*{password}" class="form-control"
                                   placeholder="Nhập mật khẩu"
                                   th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''"/>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}"
                                 th:errors="*{password}"></div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 fw-bold py-2">Đăng nhập</button>
                    </form>

                    <div class="mt-4 text-center">
                        <span class="text-muted">Chưa có tài khoản?</span>
                        <a href="/register" class="text-decoration-none fw-bold">Đăng ký ngay</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
