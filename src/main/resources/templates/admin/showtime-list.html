<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Lịch chiếu - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/dashboard}"><i class="bi bi-shield-check"></i> Admin Panel</a>
        <div class="navbar-nav">
            <a class="nav-link" th:href="@{/admin/movies}">Quản lý Phim</a>
            <a class="nav-link active" th:href="@{/admin/showtimes}">Lịch chiếu</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i> <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-primary mb-0"><i class="bi bi-calendar-event"></i> Lịch chiếu phim</h2>
        <a th:href="@{/admin/showtimes/add}" class="btn btn-success fw-bold">
            <i class="bi bi-plus-lg"></i> Tạo suất chiếu mới
        </a>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                <tr>
                    <th class="ps-3">Phim</th>
                    <th>Phòng</th>
                    <th>Bắt đầu</th>
                    <th>Kết thúc</th>
                    <th>Giá vé</th>
                    <th class="text-center">Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="st : ${showtimes}">
                    <td class="ps-3">
                        <strong th:text="${st.movie.title}"></strong><br>
                        <small class="text-muted" th:text="${st.movie.durationMinutes + ' phút'}"></small>
                    </td>
                    <td class="align-middle" th:text="${st.room.roomName}"></td>
                    <td class="align-middle" th:text="${#temporals.format(st.startTime, 'dd/MM/yyyy HH:mm')}"></td>
                    <td class="align-middle" th:text="${#temporals.format(st.endTime, 'HH:mm')}"></td>
                    <td class="align-middle text-primary fw-bold" th:text="${#numbers.formatDecimal(st.price, 0, 'COMMA', 0, 'POINT') + ' VNĐ'}"></td>
                    <td class="align-middle text-center">
                        <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i> Hủy</button>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(showtimes)}">
                    <td colspan="6" class="text-center py-4 text-muted">Chưa có lịch chiếu nào được sắp xếp.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
