<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tạo Suất Chiếu - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div th:if="${error}" class="alert alert-danger shadow-sm">
                <i class="bi bi-exclamation-triangle-fill me-2"></i> <span th:text="${error}"></span>
            </div>

            <div class="card shadow border-0">
                <div class="card-header bg-success text-white py-3">
                    <h5 class="mb-0"><i class="bi bi-calendar-plus"></i> Thiết lập suất chiếu mới</h5>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/admin/showtimes/save}" method="post" th:object="${showtime}">

                        <div class="mb-3">
                            <label class="form-label fw-bold">Chọn Phim</label>
                            <select th:field="*{movie.movieId}" class="form-select" required>
                                <option value="" selected>-- Chọn bộ phim --</option>
                                <option th:each="m : ${movies}" th:value="${m.movieId}" th:text="${m.title}"></option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Phòng chiếu</label>
                            <select th:field="*{room.roomId}" class="form-select" required>
                                <option value="" selected>-- Chọn phòng --</option>
                                <option th:each="r : ${rooms}" th:value="${r.roomId}" th:text="${r.roomName + ' (' + r.capacity + ' ghế)'}"></option>
                            </select>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Giờ bắt đầu</label>
                                <input type="datetime-local" th:field="*{startTime}" class="form-control" required />
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Giá vé (VNĐ)</label>
                                <input type="number" th:field="*{price}" class="form-control" placeholder="80000" required />
                            </div>
                        </div>

                        <div class="alert alert-warning py-2 small">
                            <i class="bi bi-info-circle"></i> Hệ thống sẽ tự tính giờ kết thúc và cộng thêm 30 phút dọn dẹp.
                        </div>

                        <div class="d-flex gap-2 mt-4">
                            <button type="submit" class="btn btn-success w-100 fw-bold">Xác nhận lên lịch</button>
                            <a th:href="@{/admin/showtimes}" class="btn btn-secondary px-4">Hủy</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
