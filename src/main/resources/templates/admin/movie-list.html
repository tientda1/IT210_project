<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Phim - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/dashboard}"><i class="bi bi-shield-check"></i> Admin Panel</a>

        <div class="navbar-nav me-auto">
            <a class="nav-link active" th:href="@{/admin/movies}">Quản lý Phim</a>
            <a class="nav-link" th:href="@{/admin/showtimes}">Lịch chiếu</a>
        </div>

        <a th:href="@{/dashboard}" class="btn btn-outline-light btn-sm">Quay lại Dashboard</a>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-primary mb-0"><i class="bi bi-camera-reels-fill"></i> Danh sách phim</h2>
        <a th:href="@{/admin/movies/add}" class="btn btn-success fw-bold">
            <i class="bi bi-plus-circle"></i> Thêm phim mới
        </a>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-primary">
                <tr>
                    <th class="ps-3">ID</th>
                    <th>Poster</th>
                    <th>Tên Phim</th>
                    <th>Đạo diễn</th>
                    <th>Thể loại</th>
                    <th>Thời lượng</th>
                    <th>Ngày khởi chiếu</th>
                    <th class="text-center">Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="movie : ${movies}">
                    <td class="align-middle ps-3" th:text="${movie.movieId}"></td>
                    <td class="align-middle">
                        <img th:src="${movie.posterUrl}" width="50" height="75" class="rounded shadow-sm" alt="Poster">
                    </td>
                    <td class="align-middle"><strong th:text="${movie.title}"></strong></td>

                    <td class="align-middle" th:text="${movie.director}"></td>

                    <td class="align-middle" th:text="${movie.genre != null ? movie.genre.genreName : 'N/A'}"></td>
                    <td class="align-middle" th:text="${movie.durationMinutes + ' phút'}"></td>
                    <td class="align-middle" th:text="${movie.releaseDate}"></td>
                    <td class="align-middle text-center">
                        <a th:href="@{/admin/movies/edit/{id}(id=${movie.movieId})}"
                           class="btn btn-sm btn-outline-warning me-2">
                            <i class="bi bi-pencil-square"></i> Sửa
                        </a>
                        <a th:href="@{/admin/movies/delete/{id}(id=${movie.movieId})}"
                           class="btn btn-sm btn-outline-danger"
                           onclick="return confirm('Bạn có chắc chắn muốn xóa phim này?')">
                            <i class="bi bi-trash"></i> Xóa
                        </a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(movies)}">
                    <td colspan="8" class="text-center py-4 text-muted">Chưa có bộ phim nào trong hệ thống.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
