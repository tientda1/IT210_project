<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký tài khoản</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-success text-white text-center py-3">
                    <h4 class="mb-0">Đăng ký thành viên mới</h4>
                </div>
                <div class="card-body p-4">

                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                    <form action="/register" method="post" th:object="${registerDTO}">

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Tài khoản <span class="text-danger">*</span></label>
                                <input type="text" th:field="*{username}" class="form-control"
                                       th:classappend="${#fields.hasErrors('username')} ? 'is-invalid' : ''"/>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('username')}"
                                     th:errors="*{username}"></div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Mật khẩu <span class="text-danger">*</span></label>
                                <input type="password" th:field="*{rawPassword}" class="form-control"
                                       th:classappend="${#fields.hasErrors('rawPassword')} ? 'is-invalid' : ''"/>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('rawPassword')}"
                                     th:errors="*{rawPassword}"></div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Họ và tên <span class="text-danger">*</span></label>
                            <input type="text" th:field="*{fullName}" class="form-control"
                                   th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid' : ''"/>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('fullName')}"
                                 th:errors="*{fullName}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Email <span class="text-danger">*</span></label>
                            <input type="text" th:field="*{email}" class="form-control" placeholder="vidu@gmail.com"
                                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''"/>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}"
                                 th:errors="*{email}"></div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Số điện thoại <span class="text-danger">*</span></label>
                            <input type="text" th:field="*{phone}" class="form-control"
                                   th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid' : ''"/>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('phone')}"
                                 th:errors="*{phone}"></div>
                        </div>

                        <button type="submit" class="btn btn-success w-100 fw-bold py-2">Xác nhận đăng ký</button>
                    </form>

                    <div class="mt-4 text-center">
                        <span class="text-muted">Đã có tài khoản?</span>
                        <a href="/login" class="text-decoration-none text-success">Đăng nhập tại đây</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
